name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - ".github/workflows/flutter_web_pages.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Pinned to the locally-verified SDK. Unpinned `stable` drifted to a
          # Flutter that removed CupertinoPageTransitionsBuilder, breaking the
          # build. Bump this deliberately after verifying SDK compatibility.
          flutter-version: 3.38.7
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Static analysis
        working-directory: frontend
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Unit tests
        working-directory: frontend
        run: flutter test

      - name: Build web
        working-directory: frontend
        # Custom domain (nestapp.life) serves from the site root, so the app
        # must be built with base-href "/" — not the old "/nest/" subpath used
        # by lionandthelab.github.io/nest/.
        run: flutter build web --release --base-href /

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: frontend/build/web
          force_orphan: true
          # force_orphan recreates gh-pages from scratch each deploy, which
          # would delete the CNAME GitHub added for the custom domain. Re-write
          # it here so the custom domain survives every deploy.
          cname: nestapp.life

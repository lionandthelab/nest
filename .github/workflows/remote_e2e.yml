name: Remote Supabase E2E

on:
  push:
    branches: ["main"]
    paths:
      - "scripts/e2e_remote.mjs"
      - "supabase/**"
      - ".github/workflows/remote_e2e.yml"
  workflow_dispatch:

jobs:
  remote-e2e:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Skip when secrets are missing
        if: ${{ env.SUPABASE_URL == '' || env.SUPABASE_ANON_KEY == '' || env.SUPABASE_SERVICE_ROLE_KEY == '' }}
        run: echo "Remote E2E skipped because SUPABASE_URL, SUPABASE_ANON_KEY, or SUPABASE_SERVICE_ROLE_KEY is not configured."

      - name: Run remote E2E script
        if: ${{ env.SUPABASE_URL != '' && env.SUPABASE_ANON_KEY != '' && env.SUPABASE_SERVICE_ROLE_KEY != '' }}
        run: node scripts/e2e_remote.mjs

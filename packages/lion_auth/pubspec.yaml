name: lion_auth
description: >-
  라이온앤더랩 공용 한국 특화 소셜 로그인 모듈.
  자격 획득 코어(Google/Kakao/Naver/Apple, 웹+앱)는 백엔드 비종속이며,
  세션 발급은 AuthBackend 어댑터(Supabase / 자체 HTTP 서버)로 분리된다.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.8.0
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter

  # 자격 획득 SDK
  google_sign_in: ^7.2.0
  google_sign_in_web: ^1.0.0 # web_only.renderButton 사용을 위한 직접 의존
  kakao_flutter_sdk_user: ^1.9.0
  flutter_naver_login: ^2.1.0
  sign_in_with_apple: '>=6.1.0 <8.0.0'

  # 백엔드 어댑터
  supabase_flutter: ^2.12.0
  http: ^1.2.0

  # 유틸
  crypto: ^3.0.3
  shared_preferences: ^2.5.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter: {}

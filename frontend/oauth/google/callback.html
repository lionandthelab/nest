<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nest Google Drive 연결</title>
    <style>
      :root {
        --main: #dcae96;
        --base: #f9f7f2;
        --text: #2e2a27;
        --muted: #6c625c;
        --line: #e8dfd7;
        --ok: #6b8e6d;
        --danger: #b55a4a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "SUIT Variable", "Pretendard", "Noto Sans KR", system-ui, sans-serif;
        background: radial-gradient(circle at top right, #fff6f0 0%, var(--base) 50%, #f1eee6 100%);
        color: var(--text);
      }

      .card {
        width: min(520px, calc(100vw - 32px));
        border: 1px solid var(--line);
        border-radius: 16px;
        background: #fff;
        padding: 18px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 24px;
      }

      p {
        margin: 0 0 8px;
        color: var(--muted);
      }

      .status {
        margin-top: 14px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fffdfb;
        color: var(--text);
        white-space: pre-wrap;
        word-break: break-word;
      }

      .status.ok {
        border-color: rgba(107, 142, 109, 0.4);
        background: rgba(107, 142, 109, 0.08);
      }

      .status.error {
        border-color: rgba(181, 90, 74, 0.4);
        background: rgba(181, 90, 74, 0.08);
      }

      .actions {
        margin-top: 12px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      button,
      a {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
        color: var(--text);
        text-decoration: none;
        padding: 9px 12px;
        font: inherit;
        cursor: pointer;
      }

      button.primary {
        border-color: transparent;
        background: var(--main);
        color: #fff;
      }
    </style>
  </head>
  <body>
    <article class="card">
      <h1>Google Drive 연결 처리</h1>
      <p>인증 코드를 Nest에 전달하고 있습니다.</p>
      <div id="status" class="status">준비 중...</div>
      <div class="actions">
        <button id="closeBtn" class="primary" type="button">창 닫기</button>
        <a href="/" target="_self">앱으로 이동</a>
      </div>
    </article>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../config.js"></script>
    <script>
      (async function main() {
        const statusEl = document.getElementById("status");
        const closeBtn = document.getElementById("closeBtn");

        closeBtn.addEventListener("click", () => window.close());

        const cfg = window.NEST_CONFIG || {};
        if (!cfg.supabaseUrl || !cfg.supabaseAnonKey) {
          fail("config.js에서 Supabase 설정을 찾지 못했습니다.");
          return;
        }

        const sb = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
        const params = new URLSearchParams(window.location.search);

        const code = params.get("code");
        const oauthError = params.get("error");
        const oauthErrorDesc = params.get("error_description");
        const state = params.get("state");

        if (oauthError) {
          fail(`Google OAuth 오류: ${oauthError}\n${oauthErrorDesc || ""}`);
          notifyParent({ success: false, error: oauthErrorDesc || oauthError });
          return;
        }

        if (!code) {
          fail("OAuth code가 없습니다. 다시 시도하세요.");
          notifyParent({ success: false, error: "missing_code" });
          return;
        }

        const {
          data: { session }
        } = await sb.auth.getSession();

        if (!session?.access_token) {
          fail("로그인 세션이 없습니다. 메인 화면에서 다시 로그인 후 시도하세요.");
          notifyParent({ success: false, error: "missing_session" });
          return;
        }

        const context = loadContextFromStateAndStorage(state);
        if (!context.homeschool_id) {
          fail("홈스쿨 컨텍스트를 찾지 못했습니다. 메인 화면에서 다시 시도하세요.");
          notifyParent({ success: false, error: "missing_homeschool" });
          return;
        }

        setStatus("인증 코드 교환 중...");

        const { data, error } = await sb.functions.invoke("google-drive-connect-complete", {
          body: {
            homeschool_id: context.homeschool_id,
            code,
            root_folder_id: context.root_folder_id || null,
            folder_policy: context.folder_policy || "TERM_CLASS_DATE"
          }
        });

        if (error) {
          fail(`연결 실패: ${error.message}`);
          notifyParent({ success: false, error: error.message });
          return;
        }

        const payload = {
          success: true,
          homeschool_id: context.homeschool_id,
          root_folder_id: context.root_folder_id || null,
          folder_policy: context.folder_policy || "TERM_CLASS_DATE",
          response: data || null
        };

        try {
          localStorage.setItem("nest.oauth.result", JSON.stringify(payload));
        } catch (_) {
          // ignore
        }

        ok("Google Drive 연결이 완료되었습니다.\n이 창은 닫아도 됩니다.");
        notifyParent(payload);

        setTimeout(() => {
          window.close();
        }, 1200);
      })();

      function loadContextFromStateAndStorage(stateToken) {
        const out = {
          homeschool_id: "",
          root_folder_id: "",
          folder_policy: "TERM_CLASS_DATE"
        };

        try {
          out.homeschool_id = localStorage.getItem("nest.oauth.homeschool_id") || "";
          out.root_folder_id = localStorage.getItem("nest.oauth.root_folder_id") || "";
          out.folder_policy = localStorage.getItem("nest.oauth.folder_policy") || "TERM_CLASS_DATE";
        } catch (_) {
          // ignore
        }

        if (!stateToken) return out;

        try {
          const decoded = JSON.parse(base64UrlDecode(stateToken));
          if (decoded?.homeschool_id) out.homeschool_id = decoded.homeschool_id;
        } catch (_) {
          // ignore invalid state
        }

        return out;
      }

      function base64UrlDecode(input) {
        const normalized = input.replace(/-/g, "+").replace(/_/g, "/");
        const padded = normalized + "=".repeat((4 - (normalized.length % 4)) % 4);
        return atob(padded);
      }

      function notifyParent(payload) {
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage(
            {
              type: "nest-google-oauth-complete",
              payload
            },
            window.location.origin
          );
        }
      }

      function setStatus(text) {
        const statusEl = document.getElementById("status");
        statusEl.textContent = text;
      }

      function ok(text) {
        const statusEl = document.getElementById("status");
        statusEl.textContent = text;
        statusEl.classList.add("ok");
        statusEl.classList.remove("error");
      }

      function fail(text) {
        const statusEl = document.getElementById("status");
        statusEl.textContent = text;
        statusEl.classList.add("error");
        statusEl.classList.remove("ok");
      }
    </script>
  </body>
</html>
